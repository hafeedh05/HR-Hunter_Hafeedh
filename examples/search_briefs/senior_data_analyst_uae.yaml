id: senior-data-analyst-uae
role_title: Senior Data Analyst
brief_summary: >
  UAE-based search for a Senior Data Analyst who can turn product, commercial,
  and operational data into clear business decisions. Prioritize candidates
  with strong SQL and Python fundamentals, hands-on dashboarding, KPI design,
  experimentation or forecasting exposure, and experience partnering with
  product, growth, finance, or operations stakeholders. The ideal candidate is
  already operating at senior individual-contributor level rather than people
  manager level.
